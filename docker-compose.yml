services:
  postgres:
    image: postgres:16-alpine
    container_name: foodiefind-postgres
    restart: always
    environment:
      POSTGRES_USER: foodiefind_user
      POSTGRES_PASSWORD: foodiefind_password
      POSTGRES_DB: foodiefind_db
    ports:
      - "5432:5432"
    volumes:
      - foodiefind_pgdata:/var/lib/postgresql/data

volumes:
  foodiefind_pgdata:
